services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ducks-gameclub-api:latest
    container_name: ducks-gameclub-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: "file:/app/data/ducks.db"
    ports:
      - "4000:4000"
    volumes:
      - ducks_gameclub_data:/app/data
      - ducks_gameclub_uploads:/app/uploads

volumes:
  ducks_gameclub_data:
  ducks_gameclub_uploads:
